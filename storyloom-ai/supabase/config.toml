# Supabase local development configuration
# Run `supabase start` to spin up the local stack.
# Docs: https://supabase.com/docs/guides/local-development

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "exp://localhost:8081"   # Expo dev client deep-link
additional_redirect_urls = [
  "storyloom://auth/callback",      # deep-link for device builds
  "http://localhost:3000/auth/callback"  # backend callback
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false        # set to true for production

[auth.external.google]
enabled = true
# Set via environment or Supabase Dashboard → Auth → Providers → Google
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "https://<project-ref>.supabase.co/auth/v1/callback"

[auth.external.apple]
enabled = true
# Set via Supabase Dashboard → Auth → Providers → Apple
# Requires: Services ID, Team ID, Key ID, private key
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_SECRET)"
redirect_uri = "https://<project-ref>.supabase.co/auth/v1/callback"
